name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Check unified SMS page JavaScript
        shell: bash
        run: |
          sed -n '/<script type="text\/javascript">/,/<\/script>/p' \
            luasrc/view/zmode-AK68/smsc-AK68.htm \
            | sed '1d;$d' \
            | sed -E 's#<%=[^%]*%>##g' \
            | node --check

      - name: Check lock schedule editor JavaScript
        shell: bash
        run: |
          sed -n '/<script type="text\/javascript">/,/<\/script>/p' \
            luasrc/view/zmode-AK68/lock-schedule-AK68.htm \
            | sed '1d;$d' \
            | sed -E 's#<%=[^%]*%>#template#g' \
            | node --check

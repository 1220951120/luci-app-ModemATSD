<%+header%>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <H2>ATSD-AK68模组短信管理工具</H2>
    <H4>提示：新收取短信需要在模组设置里面打开短信开关！</H4>
    <style>

        h2 {
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            background: #000000;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border-radius: 15px; /* 表格圆角 */
            overflow: hidden; /* 防止表格内容溢出 */
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc
            
        }

        td:nth-child(3) { /* 针对第三列的特定样式 */
            word-wrap: break-word; /* 允许单词断行 */
            text-align: left;
        }

        td:nth-child(1) { /* 针对第三列的特定样式 */
            word-wrap: break-word; /* 允许单词断行 */
            text-align: center
            
            
        }

        td:nth-child(2) { /* 针对第三列的特定样式 */
            word-wrap: break-word; /* 允许单词断行 */
            text-align: center;
        }

        td:nth-child(4) { /* 针对第三列的特定样式 */
            word-wrap: break-word; /* 允许单词断行 */
            text-align: center;
        }

        th {
            background-color: #bb5a00;
            color: white;
            
        }

        .button {
            background: #bb5a00;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 49%;
        }

        .button-2 {
            background: #bb5a00;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 49%;
        }

        .button:hover {
            background: #357ab7;
        }

        .button-2:hover {
            background: #357ab7;
        }

        .delete-button {
            background: #d9534f;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .delete-button:hover {
            background: #c9302c;
        }

        #sms-status {
            margin-top: 12px;
            min-height: 1.5em;
            color: #666;
        }

        #sms-status.error {
            color: #c9302c;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="button" onclick="sendcmd()">刷新短信</button>
        <button class="button-2" onclick="confirmDelete()">删除所有短信</button>
        <div id="sms-status"></div>
        <table id="messages">
            <thead>
                <tr>
                    <th>发件人</th>
                    <th>发件时间</th>
                    <th>内容</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script type="text/javascript">
        function sendcmd() {
            setStatus('正在读取短信…', false);
            XHR.get('<%=luci.dispatcher.build_url("admin", "modem-AK68", "smscs")%>', { op: 'list' }, function(x, rv) {
                if (!rv || !rv.success) {
                    setStatus(rv && (rv.error || rv.warning) ? (rv.error || rv.warning) : '读取短信失败。', true);
                    displayMessages([]);
                    return;
                }
                displayMessages(rv.messages || []);
                setStatus(rv.warning || ('共读取到 ' + (rv.messages || []).length + ' 条短信。'), !!rv.warning);
            });
        }

        function setStatus(message, isError) {
            var status = document.getElementById('sms-status');
            status.textContent = message || '';
            status.className = isError ? 'error' : '';
        }

        function confirmDelete() {
            var userConfirmed2 = confirm("你确定要删除所有AK68设备中的短信吗？此操作无法撤销。");
            if (userConfirmed2) {
                deleteallMessage()
            } 
        }

        function deleteMessage(index) {
            XHR.post('<%=luci.dispatcher.build_url("admin", "modem-AK68", "smscs")%>', {
                token: '<%=token%>', op: 'delete', indexes: index
            }, function(x, rv) {
                if (rv && rv.success) {
                    sendcmd();
                } else {
                    setStatus(rv && rv.error ? rv.error : '删除短信失败。', true);
                }
            });
        }

        function deleteallMessage() {
            XHR.post('<%=luci.dispatcher.build_url("admin", "modem-AK68", "smscs")%>', {
                token: '<%=token%>', op: 'delete_all'
            }, function(x, rv) {
                if (rv && rv.success) {
                    sendcmd();
                    alert('用户已删除所有短信！');
                } else {
                    setStatus(rv && rv.error ? rv.error : '删除所有短信失败。', true);
                }
            });
        }

        function appendCell(row, value) {
            var cell = document.createElement('td');
            cell.textContent = value == null ? '' : String(value);
            row.appendChild(cell);
            return cell;
        }

        function displayMessages(messages) {
            var messagesContainer = document.getElementById("messages").getElementsByTagName('tbody')[0];
            messagesContainer.textContent = '';
            if (!messages.length) {
                var emptyRow = document.createElement('tr');
                var emptyCell = appendCell(emptyRow, '设备中没有短信。');
                emptyCell.colSpan = 4;
                messagesContainer.appendChild(emptyRow);
                return;
            }

            messages.forEach(function(message) {
                var row = document.createElement('tr');
                appendCell(row, message.sender || '未知');
                appendCell(row, message.timestamp || '未知');
                var content = message.content || '';
                if (!message.complete) {
                    content += '\n[长短信尚未收全：已收到 ' + message.indexes.length + '/' + message.segment_count + ' 段]';
                }
                appendCell(row, content);

                var actionCell = document.createElement('td');
                var button = document.createElement('button');
                var indexes = (message.indexes || []).join(',');
                button.type = 'button';
                button.className = 'delete-button';
                button.textContent = '删除';
                button.addEventListener('click', function() {
                    if (confirm('确定删除设备中的第 ' + indexes + ' 条短信吗？')) {
                        deleteMessage(indexes);
                    }
                });
                actionCell.appendChild(button);
                row.appendChild(actionCell);
                messagesContainer.appendChild(row);
            });
        }

        window.onload = function() {
            sendcmd();
        };
    </script>
</body>
<%+footer%>
